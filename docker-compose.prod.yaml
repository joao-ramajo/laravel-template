services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: laravel-app
    env_file:
      - .env
    volumes:
      - laravel_storage_public:/var/www/storage/app/public
    depends_on:
      - mysql
    networks:
      - laravel-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "php", "-v"]
      interval: 5s
      timeout: 2s
      retries: 10

  nginx:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
    container_name: laravel-nginx
    ports:
      - "8081:80"
    volumes:
      - laravel_storage_public:/var/www/storage/app/public:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - laravel-network
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    container_name: laravel-db
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
    volumes:
      - laravel_mysql_data:/var/lib/mysql
    networks:
      - laravel-network
    restart: unless-stopped

volumes:
  laravel_mysql_data:
  laravel_storage_public:

networks:
  laravel-network:
    driver: bridge
